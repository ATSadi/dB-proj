<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Campus Maintenance</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="container">
        <div id="alert"></div>

        <div class="stats-grid" id="dashStats"></div>

        <div class="grid-2">
            <div class="card">
                <h2>Assign Worker</h2>
                <form id="assignForm">
                    <div class="form-group">
                        <label>Complaint (submitted)</label>
                        <select id="assignComplaint" required></select>
                    </div>
                    <div class="form-group">
                        <label>Worker</label>
                        <select id="assignWorker" required></select>
                    </div>
                    <button type="submit" class="btn btn-primary">Assign</button>
                </form>
            </div>

            <div class="card">
                <h2>Generate Report</h2>
                <form id="reportForm">
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Month</label>
                            <input type="number" id="reportMonth" min="1" max="12" value="3" required>
                        </div>
                        <div class="form-group">
                            <label>Year</label>
                            <input type="number" id="reportYear" min="2020" max="2030" value="2026" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Generate</button>
                </form>
            </div>
        </div>

        <div class="card">
            <h2>Overdue Complaints</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Category</th><th>Priority</th><th>Hours Overdue</th><th>Location</th><th>Worker</th></tr>
                    </thead>
                    <tbody id="overdueBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>Worker Performance</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>Worker</th><th>Specialization</th><th>Score</th><th>Open</th><th>Completed</th><th>Overdue</th><th>Available</th></tr>
                    </thead>
                    <tbody id="workersBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>Chronic Issues</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>Location</th><th>Category</th><th>Count</th><th>Flagged</th></tr>
                    </thead>
                    <tbody id="chronicBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>Maintenance Reports</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>Month/Year</th><th>Total</th><th>Resolved</th><th>Avg Hrs</th><th>Total Cost</th></tr>
                    </thead>
                    <tbody id="reportsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
