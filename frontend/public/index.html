<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Campus Maintenance System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="card login-card">
            <h1>Campus Maintenance</h1>
            <p class="subtitle">Complaint Management System</p>

            <div id="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="your.email@stu.edu" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
            </form>

            <div class="demo-users">
                <strong>Demo accounts (after Oracle setup):</strong>
                <code>admin@campus.edu — Admin</code>
                <code>hassan.r@stu.edu — Student</code>
                <code>rashid.i@campus.edu — Worker</code>
                <code>omar.s@campus.edu — Supervisor</code>
            </div>
        </div>
    </div>
    <script src="/js/common.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
