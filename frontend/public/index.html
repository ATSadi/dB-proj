<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Campus Maintenance System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="card login-card">
            <h1>Campus Maintenance</h1>
            <p class="subtitle">Complaint Management System</p>

            <div id="alert"></div>

            <div id="sessionBanner" style="display:none;margin-bottom:1rem;padding:0.75rem;background:var(--surface2);border-radius:6px;font-size:0.85rem;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="your.email@stu.edu" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
            </form>

            <div class="demo-users">
                <strong>Quick demo login (click to switch):</strong>
                <button type="button" class="btn btn-secondary btn-sm" style="width:100%;margin-top:0.5rem" onclick="quickLogin('hassan.r@stu.edu')">Student — hassan.r@stu.edu</button>
                <button type="button" class="btn btn-secondary btn-sm" style="width:100%;margin-top:0.35rem" onclick="quickLogin('rashid.i@campus.edu')">Worker — rashid.i@campus.edu</button>
                <button type="button" class="btn btn-secondary btn-sm" style="width:100%;margin-top:0.35rem" onclick="quickLogin('omar.s@campus.edu')">Supervisor — omar.s@campus.edu</button>
                <button type="button" class="btn btn-secondary btn-sm" style="width:100%;margin-top:0.35rem" onclick="quickLogin('admin@campus.edu')">Admin — admin@campus.edu</button>
            </div>
        </div>
    </div>
    <script src="/js/common.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
