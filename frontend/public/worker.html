<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker — Campus Maintenance</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="container">
        <div class="page-header">
            <div>
                <h2>Worker Portal</h2>
                <p>Manage assigned jobs and keep SLA on track</p>
            </div>
            <div class="toolbar" style="margin:0;">
                <button type="button" class="btn btn-secondary btn-sm" id="refreshBtn">Refresh</button>
                <button type="button" class="btn btn-primary btn-sm" id="toggleAvailBtn">Toggle availability</button>
            </div>
        </div>

        <div id="alert"></div>
        <div class="stats-grid" id="workerStats"></div>

        <div class="card">
            <h2>Assigned Complaints</h2>
            <div class="toolbar">
                <div class="filter-chips" id="jobFilters">
                    <button type="button" class="chip active" data-filter="active">Active</button>
                    <button type="button" class="chip" data-filter="done">Completed</button>
                    <button type="button" class="chip" data-filter="all">All</button>
                </div>
            </div>

            <div class="table-wrap table-desktop">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Location</th>
                            <th>Category</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>SLA</th>
                            <th>Student</th>
                            <th>Update</th>
                        </tr>
                    </thead>
                    <tbody id="complaintsBody"></tbody>
                </table>
            </div>
            <div class="complaint-cards" id="complaintsCards"></div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/worker.js"></script>
</body>
</html>
