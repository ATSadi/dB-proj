<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker — Campus Maintenance</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="container">
        <div id="alert"></div>

        <div class="stats-grid" id="workerStats"></div>

        <div class="card">
            <h2>Assigned Complaints</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Location</th>
                            <th>Category</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>SLA</th>
                            <th>Update Status</th>
                        </tr>
                    </thead>
                    <tbody id="complaintsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/worker.js"></script>
</body>
</html>
